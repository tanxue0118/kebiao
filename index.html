<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#eef5ff">
  <title>课程表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="overrides.css">
</head>
<body>
  <div class="bg-layer" id="bgLayer"></div>
  <main class="shell">
    <header class="hero">
      <div class="hero-copy">
        <div class="hero-titleline">
          <p class="eyebrow" id="todayText">今天</p>
          <h1>课程表</h1>
        </div>
      </div>
        <div class="week-switcher">
          <div class="week-stepper" aria-label="切换周次">
          <div class="week-chip">
            <span id="weekLabel">第 1 周</span>
            <small id="dateRange">--</small>
          </div>
        </div>
        <button class="today-jump" id="todayJumpBtn" type="button">今天</button>
      </div>
    </header>

    <nav class="app-tabs" aria-label="页面">
      <button class="active" data-page="todayPage" type="button">今日</button>
      <button data-page="schedulePage" type="button">课表</button>
      <button data-page="editPage" type="button">编辑</button>
      <button data-page="settingsPage" type="button">设置</button>
    </nav>

    <section class="page active" id="todayPage">
      <section class="panel today-panel">
        <div class="section-title">
          <div>
            <p>今日概览</p>
            <h2 id="todaySummary">今天的课程将由脚本填充。</h2>
          </div>
        </div>
        <div class="today-course-list" id="todayCourseList">
          <div class="timetable-empty">今日课程将由脚本填充。</div>
        </div>
      </section>
    </section>

    <section class="page" id="schedulePage">
      <nav class="days sr-only" id="dayTabs" aria-label="选择星期"></nav>
      <section class="panel schedule-panel">
        <div class="section-title">
          <div>
            <p id="activeDayText">本周课表</p>
            <h2 id="courseCount">周视图</h2>
          </div>
        </div>
        <div class="timetable" id="courseList" aria-label="周课表">
          <div class="timetable-empty">课程块将由脚本填充。</div>
        </div>
      </section>
    </section>

    <section class="page" id="editPage">
      <section class="panel editor-panel">
        <div class="section-title">
          <div>
            <p>本地保存</p>
            <h2 id="editorTitle">新课程</h2>
          </div>
        </div>
        <form id="courseForm" class="course-form">
          <input type="hidden" id="courseId">
          <label class="field">
            <span>课程名</span>
            <input id="courseName" required placeholder="高等数学">
          </label>
          <label class="field">
            <span>老师</span>
            <input id="teacher" required placeholder="王老师">
          </label>
          <label class="field">
            <span>地点</span>
            <input id="location" required placeholder="教学楼 A101">
          </label>
          <div class="form-row">
            <label class="field">
              <span>星期</span>
              <select id="dayOfWeek"></select>
            </label>
            <label class="field">
              <span>上课周次</span>
              <select id="weeks" required></select>
            </label>
          </div>
          <div class="form-row">
            <label class="field">
              <span>单双周</span>
              <select id="weekParity">
                <option value="all">每周</option>
                <option value="odd">单周</option>
                <option value="even">双周</option>
              </select>
            </label>
          </div>
          <div class="form-row">
            <label class="field">
              <span>开始节</span>
              <select id="startSection" required></select>
            </label>
            <label class="field">
              <span>结束节</span>
              <select id="endSection" required></select>
            </label>
          </div>
          <label class="field custom-time-toggle">
            <span>自定义时间</span>
            <input id="customTimeEnabled" type="checkbox">
          </label>
          <div class="form-row custom-time-row" id="customTimeRow">
            <label class="field">
              <span>自定义开始时间</span>
              <input id="startTime" type="time" required>
            </label>
            <label class="field">
              <span>自定义结束时间</span>
              <input id="endTime" type="time" required>
            </label>
          </div>
          <div class="form-actions">
            <button class="primary" type="submit">保存</button>
            <button class="danger" id="deleteBtn" type="button">删除</button>
          </div>
        </form>
      </section>
    </section>

    <section class="page" id="settingsPage">
      <section class="panel settings-panel">
        <div class="section-title">
          <div>
            <p>设置</p>
            <h2>课表设置</h2>
          </div>
        </div>
        <nav class="settings-home" aria-label="设置分类">
          <button type="button" data-settings-section-target="basic">
            <strong>基础设置</strong>
            <span>学期、周次、节次时间</span>
          </button>
          <button type="button" data-settings-section-target="view">
            <strong>外观设置</strong>
            <span>显示内容、个性化、背景</span>
          </button>
          <button type="button" data-settings-section-target="data">
            <strong>数据管理</strong>
            <span>清空、导入、导出课表</span>
          </button>
        </nav>
        <div class="settings-stack" hidden>
          <div class="settings-group" data-settings-section="basic" hidden>
            <button class="settings-back" type="button" data-settings-back>‹ 返回设置</button>
            <div class="section-title">
              <div>
                <p>学期</p>
                <h2>周次与假期</h2>
              </div>
            </div>
            <div class="form-row">
              <label class="field">
                <span>开学日期</span>
                <input id="semesterStartDate" type="date">
              </label>
              <label class="field">
                <span>本学期周数</span>
                <input id="semesterTotalWeeks" type="number" min="1" max="30" step="1">
              </label>
            </div>
            <label class="field">
              <span>假期时间段</span>
              <input id="holidayRanges" placeholder="2026-04-04~2026-04-06, 2026-05-01~2026-05-05">
            </label>
          </div>

          <div class="settings-divider" aria-hidden="true"></div>

          <div class="settings-group" data-settings-section="view" hidden>
            <button class="settings-back" type="button" data-settings-back>‹ 返回设置</button>
            <div class="section-title">
              <div>
                <p>显示内容</p>
                <h2>课表信息</h2>
              </div>
            </div>
            <label class="field setting-check">
              <input id="showWeekend" type="checkbox">
              <span>周末课程</span>
            </label>
            <fieldset class="settings-fieldset" id="visibleFields">
              <legend>显示字段</legend>
              <label><input type="checkbox" name="visibleFields" data-visible-field value="name"> 课程名</label>
              <label><input type="checkbox" name="visibleFields" data-visible-field value="teacher"> 老师</label>
              <label><input type="checkbox" name="visibleFields" data-visible-field value="location"> 地点</label>
              <label><input type="checkbox" name="visibleFields" data-visible-field value="time"> 时间</label>
              <label><input type="checkbox" name="visibleFields" data-visible-field value="sections"> 节次</label>
              <label><input type="checkbox" name="visibleFields" data-visible-field value="weeks"> 周次</label>
            </fieldset>
          </div>

          <div class="settings-divider" aria-hidden="true"></div>

          <div class="settings-group" data-settings-section="view" hidden>
            <div class="section-title">
              <div>
                <p>个性化</p>
                <h2>课程块样式</h2>
              </div>
            </div>
            <div class="form-row">
              <label class="field">
                <span>格子高度</span>
                <input id="cellHeight" type="range" min="64" max="140" step="4">
              </label>
              <label class="field">
                <span>圆角</span>
                <input id="cellRadius" type="range" min="4" max="28" step="1">
              </label>
            </div>
            <div class="form-row">
              <label class="field">
                <span>间距</span>
                <input id="cellGap" type="range" min="4" max="18" step="1">
              </label>
              <label class="field">
                <span>透明度</span>
                <input id="courseOpacity" type="range" min="0.2" max="1" step="0.05">
              </label>
              <label class="field">
                <span>卡片透明度</span>
                <input id="cardOpacity" type="range" min="0" max="1" step="0.04">
              </label>
            </div>
          </div>

          <div class="settings-divider" aria-hidden="true"></div>

          <div class="settings-group" data-settings-section="basic" hidden>
            <div class="section-title">
              <div>
                <p>课程时间</p>
                <h2>节次时间</h2>
              </div>
            </div>
            <label class="field">
              <span>每节时间</span>
              <textarea id="timeSlotsText" rows="8" spellcheck="false" placeholder="1 08:00-08:45&#10;2 08:55-09:40"></textarea>
            </label>
            <div class="form-actions data-actions compact-actions">
              <button id="saveTimeSlotsBtn" type="button">保存时间</button>
            </div>
          </div>

          <div class="settings-divider" aria-hidden="true"></div>

          <div class="settings-group" data-settings-section="view" hidden>
            <div class="section-title">
              <div>
                <p>背景</p>
                <h2>页面图片</h2>
              </div>
            </div>
            <label class="file-button">
              <input id="bgInput" type="file" accept="image/*">
              更换背景
            </label>
          </div>

          <div class="settings-divider" aria-hidden="true"></div>

          <div class="settings-group" data-settings-section="data" hidden>
            <button class="settings-back" type="button" data-settings-back>‹ 返回设置</button>
            <div class="section-title">
              <div>
                <p>本地保存</p>
                <h2>课表备份</h2>
              </div>
            </div>
            <div class="data-actions">
              <button class="danger data-control" id="clearScheduleBtn" type="button">清空课表</button>
              <label class="file-button data-file-button data-control">
                <input id="importScheduleInput" type="file" accept="application/json,.json">
                导入 JSON
              </label>
              <button class="primary data-control" id="exportScheduleBtn" type="button">导出 JSON</button>
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <template id="courseTemplate">
    <article class="course-card">
      <div class="course-time"></div>
      <div class="course-main">
        <h3></h3>
        <p class="course-meta"></p>
        <p class="course-place"></p>
      </div>
      <button class="edit-button" type="button">编辑</button>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
